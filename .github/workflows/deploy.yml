name: Deploy to Cloud Run

# Builds from source (Cloud Build reads the Dockerfile) and deploys to
# Cloud Run on every push to main. Auth is via Workload Identity
# Federation — no long-lived service-account JSON key in the repo.
# See docs/DEPLOY.md for the one-time GCP + GitHub setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-cloud-run
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

env:
  SERVICE: janvaani
  REGION: ${{ vars.GCP_REGION || 'asia-south1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write build-time env (public Firebase web config)
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          EOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 4 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT }},GOOGLE_CLOUD_LOCATION=${{ vars.VERTEX_LOCATION || 'us-central1' }},VERTEX_GEMINI_MODEL=${{ vars.VERTEX_GEMINI_MODEL || 'gemini-2.0-flash-001' }},UPLOADS_BUCKET=${{ vars.UPLOADS_BUCKET }},SUBMISSION_SALT=${{ secrets.SUBMISSION_SALT }}"

      - name: Show service URL
        run: |
          gcloud run services describe "$SERVICE" \
            --project "${{ secrets.GCP_PROJECT }}" --region "$REGION" \
            --format='value(status.url)'
